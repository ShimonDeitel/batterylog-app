name: Batterylog
options:
  bundleIdPrefix: com.shimondeitel.batterylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Batterylog:
    type: application
    platform: iOS
    sources:
      - path: Batterylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Batterylog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatterylogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatterylogTests
    dependencies:
      - target: Batterylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatterylogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatterylogUITests
    dependencies:
      - target: Batterylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Batterylog:
    build:
      targets:
        Batterylog: all
        BatterylogTests: [test]
        BatterylogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Batterylog.storekit
    test:
      config: Debug
      storeKitConfiguration: Batterylog.storekit
      targets:
        - BatterylogTests
        - BatterylogUITests
    archive:
      config: Release
